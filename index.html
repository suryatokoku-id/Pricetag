<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cek Harga Produk Suryatokoku</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
:root{--primary:#ff4fa3;--bg:#f5f5f5;}
*{box-sizing:border-box;font-family:Arial,sans-serif}
body{margin:0;background:var(--bg)}
.container{max-width:700px;margin:auto;padding:15px}
.header{
  background:white;
  color:var(--primary);
  padding:20px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}
.card{background:#fff;padding:15px;border-radius:12px;margin-top:15px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
input{width:100%;padding:12px;border:1px solid #ccc;border-radius:8px;margin-top:5px}
.row{display:flex;gap:10px;margin-top:10px}
button{flex:1;padding:12px;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
.scan{background:#444;color:#fff}
.cari,.request{background:var(--primary);color:#fff}
.price{font-size:22px;font-weight:bold;color:var(--primary)}
.pricebox{background:#fafafa;padding:10px;border-radius:8px;margin-top:8px}
.success{background:#d4edda;padding:10px;border-radius:8px;margin-top:10px}
 .menu-button{
  display:block;
  width:100%;
  background:var(--primary);
  color:white;
  text-align:center;
  padding:15px;
  border-radius:12px;
  text-decoration:none;
  font-weight:bold;
  margin-top:15px;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h2>CEK HARGA PRODUK</h2>
</div>

<a
href="request.html"
class="menu-button">

PERMINTAAN PRICE TAG

</a>

<div class="card">

<label style="margin-top:10px;display:block">Barcode / Nama Produk</label>
<input id="keyword" placeholder="Scan barcode atau ketik nama produk">

<div class="row">
<button class="scan" onclick="startScanner()">SCAN</button>
</div>
</div>

<div id="reader"></div>
<div id="hasil"></div>

</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbw0g2jFI8AD3UfthUcqubE7wCaOdPhyeuJ1tt5J-rrlODUKy2hplh_3vVnxfI3Jtt3p/exec";
let currentProducts=[];
let currentProduct=null;
let allProducts=[];
let qr = null;
 
document
.getElementById("keyword")
.addEventListener("input",cariProduk);
 
window.onload = loadData;

function cariProduk(){

 const keyword=
 document.getElementById("keyword")
 .value
 .trim()
 .toLowerCase();

 if(!keyword){

 document.getElementById("hasil").innerHTML="";
 return;

}

 currentProducts=
 allProducts.filter(item=>

  String(item.barcode||"")
  .toLowerCase()
  .includes(keyword)

  ||

  String(item.kode||"")
  .toLowerCase()
  .includes(keyword)

  ||

  String(item.nama||"")
  .toLowerCase()
  .includes(keyword)

 );

 tampilkanProduk();

}

function tampilkanProduk(){

 const hasil=document.getElementById("hasil");

 if(currentProducts.length===0){

  hasil.innerHTML=
  "<div class='card'>Produk tidak ditemukan</div>";

  return;
 }

 let html="";

 currentProducts
 .slice(0,20)
 .forEach(item=>{

 html+=`

 <div class="card">

 <h3>${item.nama}</h3>

 <p>
 Kode Item :
 <b>${item.kode}</b>
 </p>

 <div class="pricebox">
 Non Member
 <div class="price">
 Rp ${rupiah(item.non)}
 </div>
 </div>

 <div class="pricebox">
 Member Ecer
 <div class="price">
 Rp ${rupiah(item.ecer)}
 </div>
 </div>

 <div class="pricebox">
 Member Grosir
 <div class="price">
 Rp ${rupiah(item.grosir)}
 </div>
 </div>

 </div>

 `;

 });

 hasil.innerHTML=html;

}


function rupiah(x){
 return Number(x||0).toLocaleString("id-ID");
}

async function loadData(){

 hasil.innerHTML =
 "<div class='card'>⏳ Memuat data produk...</div>";

 try{

  const res =
  await fetch(
   API_URL + "?action=load"
  );

  const json =
  await res.json();

  allProducts =
  json.data || [];

  hasil.innerHTML =
  `<div class='card'>
   ✅ ${allProducts.length.toLocaleString("id-ID")} produk berhasil dimuat
  </div>`;

  setTimeout(()=>{
   hasil.innerHTML="";
  },1500);

 }catch(err){

  console.error(err);

  hasil.innerHTML =
  "<div class='card'>❌ " + err + "</div>";

 }

}

 
function startScanner(){

 if(qr){
  return;
 }

 document.getElementById("reader").innerHTML="";

 qr =
 new Html5Qrcode("reader");

 qr.start(
  {facingMode:"environment"},
  {fps:10,qrbox:250},
  (decoded)=>{

   document.getElementById("keyword").value =
   decoded;

   qr.stop().then(()=>{

    qr = null;

    document.getElementById("reader").innerHTML="";

    cariProduk();

   });

  }
 );

}
</script>
</body>
</html>
