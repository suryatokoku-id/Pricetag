<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cek Harga Produk Suryatokoku</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
:root{--primary:#ff4fa3;--bg:#f5f5f5;}
*{box-sizing:border-box;font-family:Arial,sans-serif}
body{margin:0;background:var(--bg)}
.container{max-width:700px;margin:auto;padding:15px}
.header{background:var(--primary);color:#fff;padding:20px;border-radius:12px;text-align:center}
.card{background:#fff;padding:15px;border-radius:12px;margin-top:15px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
input{width:100%;padding:12px;border:1px solid #ccc;border-radius:8px;margin-top:5px}
.row{display:flex;gap:10px;margin-top:10px}
button{flex:1;padding:12px;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
.scan{background:#444;color:#fff}
.cari,.request{background:var(--primary);color:#fff}
.price{font-size:22px;font-weight:bold;color:var(--primary)}
.pricebox{background:#fafafa;padding:10px;border-radius:8px;margin-top:8px}
.success{background:#d4edda;padding:10px;border-radius:8px;margin-top:10px}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h2>CEK HARGA PRODUK</h2>

<div style="margin-top:15px">
<button
onclick="window.location.href='request.html'"
style="
background:white;
color:#ff4fa3;
border:none;
padding:10px 15px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
width:auto;
">
PERMINTAAN PRICE TAG
</button>

<button
onclick="refreshData()"
style="
background:white;
color:#ff4fa3;
border:none;
padding:10px 15px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
width:auto;
margin-left:10px;
">
🔄 REFRESH DATA
</button>
 
</div>

</div>

<div class="card">

<label style="margin-top:10px;display:block">Barcode / Nama Produk</label>
<input id="keyword" placeholder="Scan barcode atau ketik nama produk">

<div class="row">
<button class="scan" onclick="startScanner()">SCAN</button>
</div>
</div>

<div id="reader"></div>
<div id="hasil"></div>

</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbwxSUDdSAx-NcB4lUZMAyHP7xraOmCK60uDi5fXEC1HhBVxszeLIKg3qN_GZFrIFoOX/exec";
let currentProducts=[];
let currentProduct=null;
let allProducts=[];
let qr = null;
 
document
.getElementById("keyword")
.addEventListener("input",cariProduk);
 
window.onload = loadData;

function cariProduk(){

 const keyword=
 document.getElementById("keyword")
 .value
 .trim()
 .toLowerCase();

 if(!keyword){

 document.getElementById("hasil").innerHTML="";
 return;

}

 currentProducts=
 allProducts.filter(item=>

  String(item.barcode||"")
  .toLowerCase()
  .includes(keyword)

  ||

  String(item.kode||"")
  .toLowerCase()
  .includes(keyword)

  ||

  String(item.nama||"")
  .toLowerCase()
  .includes(keyword)

 );

 tampilkanProduk();

}

function tampilkanProduk(){

 const hasil=document.getElementById("hasil");

 if(currentProducts.length===0){

  hasil.innerHTML=
  "<div class='card'>Produk tidak ditemukan</div>";

  return;
 }

 let html="";

 currentProducts
 .slice(0,20)
 .forEach(item=>{

 html+=`

 <div class="card">

 <h3>${item.nama}</h3>

 <p>
 Kode Item :
 <b>${item.kode}</b>
 </p>

 <div class="pricebox">
 Non Member
 <div class="price">
 Rp ${rupiah(item.non)}
 </div>
 </div>

 <div class="pricebox">
 Member Ecer
 <div class="price">
 Rp ${rupiah(item.ecer)}
 </div>
 </div>

 <div class="pricebox">
 Member Grosir
 <div class="price">
 Rp ${rupiah(item.grosir)}
 </div>
 </div>

 </div>

 `;

 });

 hasil.innerHTML=html;

}


function rupiah(x){
 return Number(x||0).toLocaleString("id-ID");
}

async function loadData(){

 const CACHE_KEY = "masterProduk";
 const CACHE_TIME_KEY = "masterProdukTime";

 const cacheData =
 localStorage.getItem(CACHE_KEY);

 const cacheTime =
 localStorage.getItem(CACHE_TIME_KEY);

 const enamJam =
 6 * 60 * 60 * 1000;

 const terakhirUpdate =
cacheTime
? new Date(Number(cacheTime))
   .toLocaleString("id-ID")
: "-";

 // Jika cache masih berlaku
 if(
  cacheData &&
  cacheTime &&
  (Date.now() - Number(cacheTime)) < enamJam
 ){

  allProducts =
  JSON.parse(cacheData);

  hasil.innerHTML =
`<div class='card'>
⚡ Data dari cache
<br>
${allProducts.length.toLocaleString("id-ID")} produk
<br>
Update:
${terakhirUpdate}
</div>`;

  setTimeout(()=>{
   hasil.innerHTML="";
  },1000);

  return;

 }

 // Jika cache tidak ada / sudah lewat 6 jam

 hasil.innerHTML =
 "<div class='card'>⏳ Memuat data produk...</div>";

 try{

  const res =
  await fetch(
   API_URL + "?action=load"
  );

  const json =
  await res.json();

  allProducts =
  json.data || [];

  // Simpan cache
  localStorage.setItem(
   CACHE_KEY,
   JSON.stringify(allProducts)
  );

  localStorage.setItem(
   CACHE_TIME_KEY,
   Date.now()
  );

  hasil.innerHTML =
  `<div class='card'>
   ✅ ${allProducts.length.toLocaleString("id-ID")} produk berhasil dimuat
  </div>`;

  setTimeout(()=>{
   hasil.innerHTML="";
  },1500);

 }catch(err){

 console.error(err);

 hasil.innerHTML =
 "<div class='card'>❌ " + err + "</div>";

}

}

 async function refreshData(){

 hasil.innerHTML =
 "<div class='card'>🔄 Mengambil data terbaru...</div>";

 localStorage.removeItem(
  "masterProduk"
 );

 localStorage.removeItem(
  "masterProdukTime"
 );

 await loadData();

}
 
function startScanner(){

 if(qr){
  return;
 }

 document.getElementById("reader").innerHTML="";

 qr =
 new Html5Qrcode("reader");

 qr.start(
  {facingMode:"environment"},
  {fps:10,qrbox:250},
  (decoded)=>{

   document.getElementById("keyword").value =
   decoded;

   qr.stop().then(()=>{

    qr = null;

    document.getElementById("reader").innerHTML="";

    cariProduk();

   });

  }
 );

}
</script>
</body>
</html>
