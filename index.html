<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suryatokoku — Portal Cek Harga Modern</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts - Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- html5-qrcode -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        /* Scanner laser */
        @keyframes scan {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }
        .scanner-laser {
            position: absolute;
            height: 3px;
            width: 100%;
            background: linear-gradient(to right, transparent, #10b981, transparent);
            animation: scan 2s linear infinite;
            box-shadow: 0 0 10px #10b981;
        }
        
        /* FIX: Reset style bawaan html5-qrcode agar tidak merusak tampilan modern */
        #reader {
            border: none !important;
        }
        #reader video {
            border-radius: 1.25rem !important;
            object-fit: cover !important;
            width: 100% !important;
            height: auto !important;
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen pb-16 bg-[#fafbfc]">

    <!-- PREMIUM SPLASH LOADING SCREEN -->
    <div id="splash-screen" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center transition-all duration-700 ease-in-out">
        <div class="relative flex flex-col items-center text-center px-6 max-w-sm">
            <!-- Pulsing Elegant Ring -->
            <div class="absolute w-36 h-36 bg-pink-100/60 rounded-full animate-ping"></div>
            
            <!-- Modern Store Icon Container -->
            <div class="relative bg-gradient-to-tr from-[#ff4fa3] to-[#d93a83] text-white p-6 rounded-3xl shadow-xl shadow-pink-500/20 mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
            </div>
            
            <!-- Brand & Status Loading Text -->
            <h2 class="text-slate-900 text-2xl font-extrabold tracking-tight mb-2">SURYATOKOKU</h2>
            <div class="inline-flex items-center gap-1.5 px-3 py-1 bg-slate-50 border border-slate-100 rounded-full text-[11px] font-semibold text-slate-500 mb-6">
                <span class="w-1.5 h-1.5 rounded-full bg-[#ff4fa3] animate-pulse"></span>
                <span>Sinkronisasi Data Produk...</span>
            </div>
            <p id="splash-status" class="text-slate-400 text-xs font-medium">Menghubungkan ke database pusat secara aman</p>
        </div>
    </div>

    <!-- MAIN APP CONTAINER -->
    <div class="max-w-md mx-auto px-4 pt-6">
        
        <!-- HEADER BRAND -->
        <header class="bg-gradient-to-r from-[#ff4fa3] to-[#e03a89] rounded-3xl p-6 text-white shadow-xl shadow-pink-500/10 mb-5 relative overflow-hidden">
            <!-- Decorative blur background items -->
            <div class="absolute -right-12 -bottom-12 w-32 h-32 bg-white/10 rounded-full blur-xl"></div>
            <div class="absolute -left-6 -top-6 w-24 h-24 bg-pink-300/20 rounded-full blur-lg"></div>
            
            <div class="relative z-10 flex flex-col items-center text-center">
                <div class="bg-white/15 p-2.5 rounded-2xl backdrop-blur-md mb-3 border border-white/10">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                    </svg>
                </div>
                
                <h1 class="text-[10px] font-bold uppercase tracking-wider text-pink-100 mb-0.5">Sistem Cek Harga</h1>
                <h2 class="text-2xl font-extrabold tracking-tight">SURYATOKOKU</h2>
                
                <!-- Status Badge -->
                <div id="db-status" class="mt-4 inline-flex items-center gap-1.5 px-3 py-1 bg-white/10 rounded-full text-[11px] font-medium backdrop-blur-md border border-white/10">
                    <span class="w-1.5 h-1.5 rounded-full bg-amber-400 animate-pulse"></span>
                    <span>Menghubungkan database...</span>
                </div>
            </div>
        </header>

        <!-- SEARCH CONTAINER -->
        <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 mb-5">
            <div class="relative">
                <input id="keyword" type="text" placeholder="Masukkan nama produk, kode atau scan..." 
                    class="w-full pl-11 pr-24 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl focus:outline-none focus:ring-4 focus:ring-pink-500/10 focus:border-[#ff4fa3] focus:bg-white text-sm font-medium transition-all placeholder-slate-400">
                
                <!-- Search Icon Left -->
                <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>

                <!-- Right Controls: Voice, Clear -->
                <div class="absolute right-3 top-1/2 -translate-y-1/2 flex items-center gap-1">
                    <!-- Clear Button -->
                    <button id="clear-btn" class="text-slate-400 hover:text-slate-700 hidden p-1 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
                        </svg>
                    </button>
                    <!-- Voice Search Button -->
                    <button id="voice-btn" onclick="startVoiceSearch()" class="text-[#ff4fa3] hover:bg-pink-50 p-1.5 rounded-lg transition-all" title="Cari dengan Suara">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Scanner Button Primary -->
            <button onclick="startScanner()" class="mt-4 w-full bg-slate-900 hover:bg-slate-850 text-white font-bold text-sm py-4 rounded-2xl flex items-center justify-center gap-2.5 transition-all shadow-md shadow-slate-900/5 active:scale-[0.99]">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
                </svg>
                <span>BUKA SCANNER BARCODE</span>
            </button>
        </div>

        <!-- CAMERA SCANNER VIEWPORT MODAL-LIKE -->
        <div id="scanner-wrapper" class="hidden bg-slate-950 rounded-3xl p-4 mb-5 relative overflow-hidden border border-slate-800 shadow-inner">
            <div class="flex items-center justify-between mb-3 text-white">
                <span class="text-xs font-semibold tracking-wider text-emerald-400 flex items-center gap-1.5">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-ping"></span>
                    Kamera Aktif
                </span>
                <button onclick="stopScanner()" class="text-xs bg-white/10 hover:bg-red-500 text-slate-250 hover:text-white px-3 py-1.5 rounded-xl font-bold transition-all">
                    Tutup
                </button>
            </div>
            
            <!-- FIX: Dihapus pembatas aspect-ratio keras & overflow agar video merender penuh di layar HP -->
            <div class="relative rounded-2xl bg-black border border-slate-800 p-0.5">
                <div id="reader" class="w-full"></div>
                <!-- Laser Overlay -->
                <div id="laser-effect" class="absolute top-0 left-0 w-full h-full pointer-events-none z-10 hidden">
                    <div class="scanner-laser"></div>
                </div>
            </div>
            <p class="text-[11px] text-slate-550 text-center mt-2.5">Arahkan kamera ke bagian barcode produk secara fokus</p>
        </div>

        <!-- RESULTS LIST -->
        <main id="hasil" class="space-y-4"></main>
    </div>

    <!-- AI ADVISOR MODAL SHEET -->
    <div id="ai-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-end justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white w-full max-w-md rounded-t-[2.5rem] p-6 shadow-2xl transition-transform duration-300 translate-y-full flex flex-col max-h-[85vh]">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-4 cursor-pointer" onclick="closeAiModal()"></div>
            
            <div class="flex items-center gap-3 mb-4">
                <div class="bg-pink-100 p-2.5 rounded-2xl text-[#ff4fa3]">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                <div>
                    <h3 id="ai-modal-title" class="font-bold text-slate-900 text-base">Asisten Pintar Suryatokoku</h3>
                    <p id="ai-modal-subtitle" class="text-xs text-slate-400">Analisis Strategi & Konten Promosi</p>
                </div>
            </div>

            <!-- Selection Tab -->
            <div class="flex bg-slate-100 p-1.5 rounded-2xl mb-4">
                <button id="tab-analysis" onclick="switchAiTab('analysis')" class="flex-1 text-center py-2 text-xs font-bold rounded-xl transition-all bg-white text-slate-900 shadow-sm">
                    ✨ Strategi & Analisis
                </button>
                <button id="tab-promo" onclick="switchAiTab('promo')" class="flex-1 text-center py-2 text-xs font-semibold rounded-xl transition-all text-slate-500">
                    ✨ Buat Promosi
                </button>
            </div>

            <!-- Modal Scrollable Content -->
            <div class="flex-1 overflow-y-auto pr-1 text-sm text-slate-700 leading-relaxed" id="ai-modal-content">
                <!-- Content injected dynamically -->
            </div>

            <!-- Actions -->
            <div class="mt-4 pt-4 border-t border-slate-100 flex gap-2">
                <button onclick="copyAiOutput()" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold text-xs py-3.5 rounded-2xl transition-all flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                    </svg>
                    <span>Salin Hasil</span>
                </button>
                <button onclick="closeAiModal()" class="flex-1 bg-slate-900 hover:bg-slate-850 text-white font-bold text-xs py-3.5 rounded-2xl transition-all">
                    Tutup
                </button>
            </div>
        </div>
    </div>

    <!-- NOTIFICATION TOAST TEMPLATE -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 bg-slate-900 text-white text-xs font-semibold px-4.5 py-3 rounded-2xl shadow-lg flex items-center gap-2 transform translate-y-20 opacity-0 transition-all duration-300 pointer-events-none"></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbw0g2jFI8AD3UfthUcqubE7wCaOdPhyeuJ1tt5J-rrlODUKy2hplh_3vVnxfI3Jtt3p/exec";
        // Gemini API Configuration (Default sandbox key is bound dynamically in execution environment)
        const apiKey = "";
        
        let currentProducts = [];
        let allProducts = [];
        let qr = null;
        let selectedProductForAi = null;
        let currentAiTab = "analysis";
        let aiCache = {}; // Cache AI responses to avoid excessive API calls

        // INDEXEDDB CONFIGURATION FOR INSTANT LOADING
        const DB_NAME = "SuryatokokuLocalDB";
        const STORE_NAME = "product_cache";

        const keywordInput = document.getElementById("keyword");
        const clearBtn = document.getElementById("clear-btn");
        const hasilDiv = document.getElementById("hasil");
        const dbStatus = document.getElementById("db-status");
        const splashScreen = document.getElementById("splash-screen");
        const splashStatus = document.getElementById("splash-status");

        keywordInput.addEventListener("input", () => {
            if (keywordInput.value.length > 0) {
                clearBtn.classList.remove("hidden");
            } else {
                clearBtn.classList.add("hidden");
            }
            cariProduk();
        });

        clearBtn.addEventListener("click", () => {
            keywordInput.value = "";
            clearBtn.classList.add("hidden");
            cariProduk();
            keywordInput.focus();
        });

        window.onload = loadData;

        // Custom Notification Toast instead of browser alerts
        function showToast(message, type = 'info') {
            const toast = document.getElementById("toast");
            let icon = '💡';
            if (type === 'success') icon = '✅';
            if (type === 'error') icon = '❌';

            toast.innerHTML = `<span>${icon}</span> <span>${message}</span>`;
            toast.classList.remove("translate-y-20", "opacity-0");
            toast.classList.add("translate-y-0", "opacity-100");

            setTimeout(() => {
                toast.classList.add("translate-y-20", "opacity-0");
                toast.classList.remove("translate-y-0", "opacity-100");
            }, 3000);
        }

        // --- INDEXEDDB HELPER FUNCTIONS ---
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME);
                    }
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        async function getCachedProducts() {
            try {
                const db = await initDB();
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction(STORE_NAME, "readonly");
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.get("all_products");
                    request.onsuccess = () => resolve(request.result || null);
                    request.onerror = () => reject(request.error);
                });
            } catch (e) {
                console.error("Gagal memuat cache lokal:", e);
                return null;
            }
        }

        async function saveProductsToCache(data) {
            try {
                const db = await initDB();
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction(STORE_NAME, "readwrite");
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.put(data, "all_products");
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            } catch (e) {
                console.error("Gagal menyimpan cache baru:", e);
            }
        }

        // --- MAIN DATA LOADING LOGIC (STALE-WHILE-REVALIDATE) ---
        async function loadData() {
            try {
                splashStatus.innerText = "Memeriksa basis data lokal...";
                
                // Ambil data dari penyimpanan lokal (IndexedDB)
                const cachedData = await getCachedProducts();

                if (cachedData && cachedData.length > 0) {
                    // JIKA ADA CACHE: Langsung tampilkan database lokal agar instan
                    allProducts = cachedData;
                    
                    dbStatus.innerHTML = `
                        <span class="w-1.5 h-1.5 rounded-full bg-sky-400"></span>
                        <span>Mode Lokal: ${allProducts.length.toLocaleString("id-ID")} Produk (Menyelaraskan...)</span>
                    `;

                    // Tutup splash screen seketika
                    splashScreen.classList.add("opacity-0", "pointer-events-none");
                    setTimeout(() => {
                        splashScreen.classList.add("hidden");
                    }, 500);

                    // Sinkronisasi data terbaru di latar belakang
                    fetchFreshData(true);
                } else {
                    // JIKA TIDAK ADA CACHE: Unduh penuh database di awal
                    splashStatus.innerText = "Mengunduh basis data perdana (Mohon ditunggu...)";
                    await fetchFreshData(false);
                }
            } catch (err) {
                console.error(err);
                await fetchFreshData(false);
            }
        }

        // Mengunduh database terbaru online
        async function fetchFreshData(isBackground = false) {
            try {
                const res = await fetch(API_URL + "?action=load");
                const json = await res.json();
                const freshProducts = json.data || [];

                if (freshProducts.length > 0) {
                    allProducts = freshProducts;
                    await saveProductsToCache(freshProducts);
                }

                // Update status badge menjadi Hijau Aktif
                dbStatus.innerHTML = `
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span>
                    <span>Database Sinkron: ${allProducts.length.toLocaleString("id-ID")} Produk</span>
                `;

                if (!isBackground) {
                    splashScreen.classList.add("opacity-0", "pointer-events-none");
                    setTimeout(() => {
                        splashScreen.classList.add("hidden");
                    }, 500);
                    showToast(`${allProducts.length.toLocaleString("id-ID")} produk berhasil disinkronkan`, 'success');
                } else {
                    showToast("Selesai memperbarui basis data di latar belakang", "success");
                }
            } catch (err) {
                console.error("Gagal melakukan sinkronisasi database:", err);
                
                if (!isBackground) {
                    dbStatus.innerHTML = `
                        <span class="w-1.5 h-1.5 rounded-full bg-rose-500"></span>
                        <span>Gagal Terhubung ke Database</span>
                    `;

                    splashScreen.classList.add("opacity-0", "pointer-events-none");
                    setTimeout(() => {
                        splashScreen.classList.add("hidden");
                    }, 500);

                    hasilDiv.innerHTML = `
                        <div class="bg-rose-50 border border-rose-100 rounded-3xl p-6 text-center shadow-sm">
                            <div class="font-bold text-slate-900 text-sm mb-1">Gagal Sinkronisasi Pertama</div>
                            <p class="text-xs text-rose-600 mb-3">Pastikan koneksi internet stabil lalu ketuk muat ulang.</p>
                            <button onclick="location.reload()" class="px-5 py-2.5 bg-slate-900 hover:bg-slate-850 text-white rounded-xl text-xs font-bold transition-all shadow-sm">Muat Olang</button>
                        </div>
                    `;
                    showToast("Gagal memuat basis data online", "error");
                } else {
                    dbStatus.innerHTML = `
                        <span class="w-1.5 h-1.5 rounded-full bg-amber-400"></span>
                        <span>Offline: ${allProducts.length.toLocaleString("id-ID")} Produk</span>
                    `;
                    showToast("Menggunakan basis data lokal (Offline)", "info");
                }
            }
        }

        function cariProduk() {
            const keyword = keywordInput.value.trim().toLowerCase();

            if (!keyword) {
                hasilDiv.innerHTML = "";
                return;
            }

            currentProducts = allProducts.filter(item => 
                String(item.barcode || "").toLowerCase().includes(keyword) ||
                String(item.kode || "").toLowerCase().includes(keyword) ||
                String(item.nama || "").toLowerCase().includes(keyword)
            );

            tampilkanProduk();
        }

        function tampilkanProduk() {
            if (currentProducts.length === 0) {
                hasilDiv.innerHTML = `
                    <div class="bg-white rounded-3xl p-8 text-center border border-slate-100 shadow-sm">
                        <div class="w-12 h-12 bg-slate-50 text-slate-400 rounded-full flex items-center justify-center mx-auto mb-3">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        </div>
                        <h3 class="font-bold text-slate-800 text-sm">Produk Tidak Ditemukan</h3>
                        <p class="text-xs text-slate-450 mt-1">Gunakan kata pencarian lain atau pastikan barcode sudah sesuai.</p>
                    </div>
                `;
                return;
            }

            let html = "";
            currentProducts.slice(0, 20).forEach((item, index) => {
                // Gunakan index unik berbasis nama/kode untuk menghindari crash rujukan
                const itemRef = btoa(encodeURIComponent(item.kode || item.nama)).substring(0, 15);
                html += `
                    <div class="bg-white rounded-3xl p-5.5 border border-slate-100 shadow-sm hover:shadow-md transition-all duration-300">
                        <div class="mb-4">
                            <div class="flex items-start justify-between gap-2">
                                <span class="inline-block text-[10px] font-bold uppercase tracking-wider px-2.5 py-1 bg-slate-100 text-slate-600 rounded-lg mb-2">
                                    KODE: ${item.kode || '-'}
                                </span>
                                <!-- ✨ AI Assistant Button -->
                                <button onclick="openAiConsultant('${itemRef}', '${item.nama.replace(/'/g, "\\'")}', ${item.non}, ${item.ecer}, ${item.grosir})" 
                                    class="inline-flex items-center gap-1 text-[11px] font-bold text-pink-600 bg-pink-50 hover:bg-pink-100 px-3 py-1.5 rounded-xl transition-all border border-pink-100/50 active:scale-95">
                                    <span>✨ Konsultasi AI</span>
                                </button>
                            </div>
                            <h3 class="font-extrabold text-slate-900 text-base leading-tight">${item.nama}</h3>
                            ${item.barcode ? `
                                <div class="mt-2.5 flex items-center gap-1.5 text-slate-400 text-xs font-medium">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M6 20a1 1 0 001-1v-4.586a1 1 0 01.293-.707l7-7a1 1 0 00-1.414-1.414l-7 7a1 1 0 00-.293.707V19a1 1 0 001 1z" />
                                    </svg>
                                    <span>Barcode: <strong class="font-semibold text-slate-600">${item.barcode}</strong></span>
                                </div>
                            ` : ''}
                        </div>

                        <!-- Price Section (Clean Modern Card Grid) -->
                        <div class="grid grid-cols-1 gap-2.5">
                            <!-- Non Member -->
                            <div class="flex items-center justify-between p-3.5 bg-slate-50 rounded-2xl border border-slate-100/50">

                            <!-- Member Ecer -->
                            <div class="flex items-center justify-between p-3.5 bg-pink-50/40 rounded-2xl border border-pink-100/30">
                                <span class="text-xs font-bold text-[#ff4fa3] flex items-center gap-1.5">
                                    <span class="w-1.5 h-1.5 rounded-full bg-[#ff4fa3]"></span>
                                    Member Ecer
                                </span>
                                <span class="text-base font-extrabold text-[#ff4fa3]">Rp ${rupiah(item.ecer)}</span>
                            </div>

                            <!-- Member Grossir -->
                            <div class="flex items-center justify-between p-3.5 bg-indigo-50/40 rounded-2xl border border-indigo-100/30">
                                <span class="text-xs font-bold text-indigo-600 flex items-center gap-1.5">
                                    <span class="w-1.5 h-1.5 rounded-full bg-indigo-550"></span>
                                    Member Grosir
                                </span>

                `;
            });

            hasilDiv.innerHTML = html;
        }

        function rupiah(x) {
            return Number(x || 0).toLocaleString("id-ID");
        }

        // --- GEMINI API INTEGRATION & CALLS ---
        async function callGemini(promptText) {
            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{ parts: [{ text: promptText }] }],
                systemInstruction: {
                    parts: [{ text: "Anda adalah asisten AI kasir dan pakar manajemen retail terbaik untuk toko Suryatokoku. Berikan jawaban dalam bahasa Indonesia yang menarik, rapi dengan markdown, ramah, persuasif, terstruktur dengan poin-poin yang mudah dimengerti." }]
                }
            };

            let delay = 1000;
            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(endpoint, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    
                    const data = await response.json();
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (text) return text;
                    throw new Error("Struktur respon tidak valid.");
                } catch (err) {
                    console.error(`Percobaan ke-${i+1} gagal:`, err);
                    if (i === 4) throw err;
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2; // Exponential backoff
                }
            }
            throw new Error("Gagal terhubung dengan layanan AI setelah beberapa percobaan.");
        }

        // AI Feature: Open Modal and fetch/display AI Insight
        async function openAiConsultant(ref, nama, non, ecer, grosir) {
            selectedProductForAi = { ref, nama, non, ecer, grosir };
            
            const modal = document.getElementById("ai-modal");
            const modalContent = document.getElementById("ai-modal-content");
            
            document.getElementById("ai-modal-title").innerText = nama;
            document.getElementById("ai-modal-subtitle").innerText = `Struktur Harga: Non-Member Rp${rupiah(non)} | Ecer Rp${rupiah(ecer)} | Grosir Rp${rupiah(grosir)}`;

            // Open Modal UI
            modal.classList.remove("hidden");
            setTimeout(() => {
                modal.classList.remove("opacity-0");
                modal.querySelector("div").classList.remove("translate-y-full");
            }, 50);

            // Fetch AI content based on active tab
            await loadAiContent();
        }

        async function loadAiContent() {
            if (!selectedProductForAi) return;
            
            const modalContent = document.getElementById("ai-modal-content");
            const cacheKey = `${selectedProductForAi.ref}_${currentAiTab}`;

            // Check Cache
            if (aiCache[cacheKey]) {
                modalContent.innerHTML = formatMarkdown(aiCache[cacheKey]);
                return;
            }

            // Show Skeleton / Loading
            modalContent.innerHTML = `
                <div class="space-y-4 animate-pulse py-4">
                    <div class="h-4 bg-slate-200 rounded w-2/3"></div>
                    <div class="h-3 bg-slate-200 rounded w-full"></div>
                    <div class="h-3 bg-slate-200 rounded w-5/6"></div>
                    <div class="h-20 bg-pink-50 rounded-2xl w-full"></div>
                    <div class="h-3 bg-slate-200 rounded w-4/5"></div>
                </div>
            `;

            let prompt = "";
            if (currentAiTab === "analysis") {
                prompt = `Berikan analisis struktur harga retail untuk produk bernama "${selectedProductForAi.nama}". 
                Berikut adalah skema harganya saat ini:
                - Harga Non-Member (Umum): Rp${selectedProductForAi.non}
                - Harga Member Ecer: Rp${selectedProductForAi.ecer}
                - Harga Member Grosir: Rp${selectedProductForAi.grosir}
                
                Tolong berikan analisis singkat:
                1. Analisis margin/disparitas harga antara Non-Member, Member Ecer, dan Grosir (hitung persentase diskon & daya tarik hematnya).
                2. Strategi bundle atau promosi unik apa yang cocok agar pelanggan umum tertarik daftar menjadi member ecer atau grosir.
                3. Saran strategi up-selling atau cross-selling untuk meningkatkan volume penjualan produk ini.`;
            } else {
                prompt = `Buatkan 3 opsi copywriting iklan/promosi kreatif dan persuasif siap pakai untuk produk "${selectedProductForAi.nama}" dengan harga khusus:
                - Harga Normal (Non-Member): Rp${selectedProductForAi.non}
                - Harga Spesial Member Ecer: Rp${selectedProductForAi.ecer}
                - Harga Spesial Grosir: Rp${selectedProductForAi.grosir} (minimal pembelian grosir)
                
                Format iklan harus menyertakan:
                - Opsi 1: Gaya santai untuk WhatsApp/Instagram story yang kaya emoji.
                - Opsi 2: Gaya edukatif-hemat (fokus ke untungnya menjadi member).
                - Opsi 3: Gaya mendesak/urgensi tinggi (Promo terbatas).
                
                Pastikan bahasa Indonesia bersahabat, asyik, dan membuat orang ingin buru-buru membeli atau bergabung menjadi member Suryatokoku.`;
            }

            try {
                const responseText = await callGemini(prompt);
                aiCache[cacheKey] = responseText;
                modalContent.innerHTML = formatMarkdown(responseText);
            } catch (error) {
                console.error("AI Error:", error);
                modalContent.innerHTML = `
                    <div class="p-4 bg-red-50 border border-red-100 rounded-2xl text-red-700 text-xs text-center">
                        <p class="font-bold mb-1">Gagal Menghubungi Asisten AI</p>
                        <p class="mb-3">${error.message || "Pastikan Anda memiliki jaringan internet yang stabil."}</p>
                        <button onclick="loadAiContent()" class="px-4 py-2 bg-slate-900 text-white rounded-xl font-bold hover:bg-slate-800 transition-all">Coba Lagi</button>
                    </div>
                `;
            }
        }

        function switchAiTab(tab) {
            if (currentAiTab === tab) return;
            currentAiTab = tab;

            const tabAnalysisBtn = document.getElementById("tab-analysis");
            const tabPromoBtn = document.getElementById("tab-promo");

            if (tab === "analysis") {
                tabAnalysisBtn.className = "flex-1 text-center py-2 text-xs font-bold rounded-xl transition-all bg-white text-slate-900 shadow-sm";
                tabPromoBtn.className = "flex-1 text-center py-2 text-xs font-semibold rounded-xl transition-all text-slate-500";
            } else {
                tabPromoBtn.className = "flex-1 text-center py-2 text-xs font-bold rounded-xl transition-all bg-white text-slate-900 shadow-sm";
                tabAnalysisBtn.className = "flex-1 text-center py-2 text-xs font-semibold rounded-xl transition-all text-slate-500";
            }

            loadAiContent();
        }

        function closeAiModal() {
            const modal = document.getElementById("ai-modal");
            modal.classList.add("opacity-0");
            modal.querySelector("div").classList.add("translate-y-full");
            setTimeout(() => {
                modal.classList.add("hidden");
            }, 300);
        }

        function copyAiOutput() {
            const contentDiv = document.getElementById("ai-modal-content");
            // Ambil text murni dari elemen konten modal
            const rawText = contentDiv.innerText;
            
            // Menggunakan command fallback karena keterbatasan iframe
            const tempInput = document.createElement("textarea");
            tempInput.value = rawText;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);
            
            showToast("Berhasil menyalin analisis ke papan klip!", "success");
        }

        // Helper untuk memformat Markdown basic ke HTML demi estetika visual AI Modal
        function formatMarkdown(text) {
            let html = text
                .replace(/\n\n/g, '<p class="mb-3"></p>')
                .replace(/\n/g, '<br>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/### (.*?)(?:<br>|<p|$)/g, '<h4 class="font-bold text-slate-900 text-sm mt-4 mb-2 flex items-center gap-1.5 text-pink-600">$1</h4>')
                .replace(/## (.*?)(?:<br>|<p|$)/g, '<h3 class="font-extrabold text-slate-900 text-base mt-5 mb-2 border-b pb-1">$1</h3>')
                .replace(/- (.*?)(?:<br>|<p|$)/g, '<li class="ml-4 list-disc pl-1 mb-1">$1</li>');
            
            return `<div class="prose prose-sm max-w-none">${html}</div>`;
        }

        // --- FEATURE: AI VOICE SEARCH & RECOGNITION ---
        function startVoiceSearch() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                showToast("Peramban Anda tidak mendukung penelusuran suara.", "error");
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = "id-ID"; // Set Bahasa Indonesia
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            const voiceBtn = document.getElementById("voice-btn");
            voiceBtn.classList.add("animate-pulse", "bg-pink-100");
            showToast("Mendengarkan... Silakan sebutkan nama produk", "info");

            recognition.start();

            recognition.onresult = (event) => {
                const speechResult = event.results[0][0].transcript;
                keywordInput.value = speechResult;
                clearBtn.classList.remove("hidden");
                cariProduk();
                showToast(`Mencari untuk: "${speechResult}"`, "success");
            };

            recognition.onspeechend = () => {
                recognition.stop();
                voiceBtn.classList.remove("animate-pulse", "bg-pink-100");
            };

            recognition.onerror = (event) => {
                console.error("Voice recognition error:", event.error);
                voiceBtn.classList.remove("animate-pulse", "bg-pink-100");
                showToast("Gagal mendeteksi suara. Coba lagi.", "error");
            };
        }

        // --- SCANNER LOGIC ---
        function startScanner() {
            if (qr) {
                stopScanner();
                return;
            }

            const wrapper = document.getElementById("scanner-wrapper");
            const laser = document.getElementById("laser-effect");
            
            wrapper.classList.remove("hidden");
            laser.classList.remove("hidden");
            document.getElementById("reader").innerHTML = "";

            qr = new Html5Qrcode("reader");
            
            // FIX: Tambahkan videoConstraints untuk resolusi HD penuh & set aspect ratio ideal agar kamera HP sangat tajam
            qr.start(
                { facingMode: "environment" },
                { 
                    fps: 30, // Mengurangi lagging video
                    qrbox: (width, height) => {
                        const size = Math.min(width, height) * 0.75;
                        return { width: size, height: size * 0.6 };
                    },
                    aspectRatio: 1.333334, // Rasio 4:3 standar kamera belakang handphone
                    videoConstraints: {
                        facingMode: "environment",
                        width: { min: 640, ideal: 1280, max: 1920 }, // Memaksa resolusi HD agar teks barcode terbaca tajam
                        height: { min: 480, ideal: 720, max: 1080 }
                    }
                },
                (decoded) => {
                    keywordInput.value = decoded;
                    clearBtn.classList.remove("hidden");
                    
                    if (navigator.vibrate) {
                        navigator.vibrate(100);
                    }

                    stopScanner();
                    cariProduk();
                    showToast("Barcode berhasil dipindai!", "success");
                },
                (error) => {}
            ).catch(err => {
                console.error("Gagal mengakses kamera:", err);
                showToast("Akses kamera ditolak atau tidak ditemukan", "error");
                stopScanner();
            });
        }

        function stopScanner() {
            if (qr) {
                qr.stop().then(() => {
                    qr = null;
                    document.getElementById("scanner-wrapper").classList.add("hidden");
                    document.getElementById("laser-effect").classList.add("hidden");
                    document.getElementById("reader").innerHTML = "";
                }).catch(err => {
                    console.error("Gagal menghentikan scanner", err);
                    qr = null;
                    document.getElementById("scanner-wrapper").classList.add("hidden");
                    document.getElementById("laser-effect").classList.add("hidden");
                    document.getElementById("reader").innerHTML = "";
                });
            } else {
                document.getElementById("scanner-wrapper").classList.add("hidden");
                document.getElementById("laser-effect").classList.add("hidden");
            }
        }
    </script>
